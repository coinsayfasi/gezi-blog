name: Content Refresh
# Haftada 2 kez: en eski yazıyı en güncel motorla aynı URL'de yeniden üretir
# (tazelik sinyali + eski yazılar otomatik v-güncel kaliteye yükselir)
on:
  schedule:
    - cron: "0 9 * * 1,4"   # Pzt & Per 12:00 TR
  workflow_dispatch:
    inputs:
      slug:
        description: "Belirli bir yazıyı zorla yenile (opsiyonel)"
        default: ""
      days:
        description: "Kaç günden eski yazılar aday (vars. 45)"
        default: "45"

permissions:
  contents: write

concurrency:
  group: content-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r _gen/requirements.txt
      - name: Refresh oldest post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REFRESH_SLUG: ${{ github.event.inputs.slug || '' }}
          REFRESH_DAYS: ${{ github.event.inputs.days || '45' }}
        run: python -u _gen/refresh.py
      - name: Ping Google Indexing + IndexNow
        env:
          GOOGLE_INDEXING_SA: ${{ secrets.GOOGLE_INDEXING_SA }}
        run: python -u _gen/index_ping.py
      - name: Commit & push
        run: |
          [ -n "$(git status --porcelain)" ] || { echo "değişiklik yok"; exit 0; }
          # marker koruması: üretilen dosyada conflict işareti varsa DURDUR
          if grep -rIl -e '^<<<<<<< ' -e '^>>>>>>> ' --include='*.html' --include='*.xml' --include='*.json' --include='*.css' --include='*.js' . 2>/dev/null | grep -qv '/.git/'; then echo "::error::conflict marker üretilen dosyada — push iptal"; exit 1; fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refresh: içerik tazeleme (otomatik) [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase -X ours origin main; then
              # rebase sonrası ikinci tarama (güvenlik ağı)
              if grep -rIl -e '^<<<<<<< ' -e '^>>>>>>> ' --include='*.html' --include='*.xml' --include='*.json' --include='*.css' --include='*.js' . 2>/dev/null | grep -qv '/.git/'; then echo "::error::rebase sonrası marker — push iptal"; exit 1; fi
              git push && exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM%5+3))
          done
          echo "::warning::refresh push başarısız"
