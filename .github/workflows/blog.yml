name: Blog auto-writer

on:
  schedule:
    - cron: "0 7 * * *"       # her gün 10:00 TR — günde 1 özgün (maliyet kontrolü) SEO yazı (yeni domain için güvenli tempo)
  workflow_dispatch:
    inputs:
      count:
        description: "Kaç yazı üretilsin"
        default: "2"
      force_push:
        description: "Test için blog push frekans sınırını aş"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: content-publisher
  cancel-in-progress: false

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (Google Indexing)
        run: pip install -r _gen/requirements.txt
      - name: Generate post(s)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_COUNT: ${{ github.event.inputs.count || '1' }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -u _gen/generate.py
      - name: Commit & push
        run: |
          [ -n "$(git status --porcelain)" ] || { echo "değişiklik yok"; exit 0; }
          # marker koruması: üretilen dosyada conflict işareti varsa DURDUR
          if grep -rIl -e '^<<<<<<< ' -e '^>>>>>>> ' --include='*.html' --include='*.xml' --include='*.json' --include='*.css' --include='*.js' . 2>/dev/null | grep -qv '/.git/'; then echo "::error::conflict marker üretilen dosyada — push iptal"; exit 1; fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "content: yeni blog yazısı (AI, tam-SEO) [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase -X ours origin main; then
              # rebase sonrası ikinci tarama (güvenlik ağı)
              if grep -rIl -e '^<<<<<<< ' -e '^>>>>>>> ' --include='*.html' --include='*.xml' --include='*.json' --include='*.css' --include='*.js' . 2>/dev/null | grep -qv '/.git/'; then echo "::error::rebase sonrası marker — push iptal"; exit 1; fi
              git push && exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM%5+3))
          done
          echo "::error::blog push başarısız"
          exit 1
      - name: Wait for production deployment
        run: python -u _gen/wait_live.py
      - name: Ping Google Indexing + IndexNow
        continue-on-error: true
        env:
          GOOGLE_INDEXING_SA: ${{ secrets.GOOGLE_INDEXING_SA }}
        run: python -u _gen/index_ping.py
      - name: Push notification (Routevia FCM)
        continue-on-error: true
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          FORCE_BLOG_PUSH: ${{ github.event.inputs.force_push || 'false' }}
        run: python -u _gen/push_notify.py
      - name: Post new posts to Bluesky
        continue-on-error: true
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python -u _gen/social_post.py
